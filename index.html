<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Hub Pro | عالم الموسيقى</title>
    <style>
        /* تصميم عصري وسينمائي */
        :root {
            --primary: #1db954; /* لون سبوتيفاي الأخضر */
            --bg: #090909;
            --card: #121212;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding-bottom: 110px; /* مساحة للمشغل في الأسفل */
        }

        /* رأس الصفحة والبحث */
        .header {
            background: linear-gradient(to bottom, #1db95433, var(--bg));
            padding: 30px 20px;
            text-align: center;
        }

        .search-container {
            position: relative;
            max-width: 500px;
            margin: 20px auto;
        }

        input {
            width: 100%;
            padding: 15px 25px;
            border-radius: 30px;
            border: none;
            background: #222;
            color: white;
            font-size: 16px;
            outline: none;
            box-sizing: border-box;
        }

        button {
            position: absolute;
            left: 5px;
            top: 5px;
            bottom: 5px;
            border-radius: 25px;
            border: none;
            background: var(--primary);
            color: black;
            font-weight: bold;
            padding: 0 20px;
            cursor: pointer;
        }

        /* شبكة النتائج */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            padding: 20px;
        }

        .song-card {
            background: var(--card);
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            transition: transform 0.2s, background 0.2s;
            cursor: pointer;
        }

        .song-card:hover {
            background: #1e1e1e;
            transform: scale(1.03);
        }

        .song-card img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .song-title {
            margin-top: 10px;
            font-size: 13px;
            font-weight: 600;
            height: 35px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        /* المشغل السفلي الثابت */
        .player-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #111;
            border-top: 1px solid #333;
            padding: 15px;
            display: none; /* يظهر فقط عند التشغيل */
            z-index: 1000;
        }

        .now-playing {
            font-size: 12px;
            color: var(--primary);
            margin-bottom: 8px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        audio {
            width: 100%;
            height: 35px;
            filter: hue-rotate(90deg) brightness(1.5); /* تلوين المشغل للأخضر */
        }

        .loader {
            display: none;
            color: var(--primary);
            text-align: center;
            margin: 20px;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>مكتبة المليارات 🎶</h1>
    <p style="color: #888;">استمع لأي أغنية في العالم مجاناً</p>
    <div class="search-container">
        <input type="text" id="query" placeholder="اسم الفنان أو الأغنية...">
        <button onclick="startSearch()">بحث</button>
    </div>
</div>

<div class="loader" id="loader">جاري البحث في خوادم الموسيقى...</div>
<div class="results-grid" id="results"></div>

<div class="player-bar" id="player">
    <div class="now-playing" id="track-name">اسم الأغنية يظهر هنا</div>
    <audio id="audio-element" controls autoplay></audio>
</div>

<script>
    // خوادم بديلة لضمان الاستمرارية (Piped API Instances)
    const servers = [
        "https://pipedapi.kavin.rocks",
        "https://pipedapi.lunar.icu",
        "https://api.piped.victr.me",
        "https://piped-api.garudalinux.org"
    ];

    let currentServer = servers[0];

    async function startSearch() {
        const query = document.getElementById('query').value;
        const resultsDiv = document.getElementById('results');
        const loader = document.getElementById('loader');

        if (!query) return;

        resultsDiv.innerHTML = "";
        loader.style.display = "block";

        // محاولة البحث عبر السيرفرات المتاحة
        for (let server of servers) {
            try {
                const response = await fetch(`${server}/search?q=${encodeURIComponent(query)}&filter=music_songs`);
                if (!response.ok) continue;
                
                const data = await response.json();
                currentServer = server; // حفظ السيرفر الشغال حالياً
                
                displayResults(data.items);
                loader.style.display = "none";
                return; // إنهاء الدورة عند النجاح
            } catch (err) {
                console.log("السيرفر لا يستجيب، جاري تجربة سيرفر آخر...");
            }
        }
        
        loader.innerText = "عذراً، جميع السيرفرات مشغولة حالياً. حاول لاحقاً.";
    }

    function displayResults(items) {
        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = "";

        items.forEach(item => {
            if (item.type === 'stream') {
                const card = document.createElement('div');
                card.className = 'song-card';
                card.innerHTML = `
                    <img src="${item.thumbnail}" loading="lazy">
                    <div class="song-title">${item.title}</div>
                    <div style="font-size: 10px; color:#666;">${item.uploaderName}</div>
                `;
                card.onclick = () => loadAudio(item.url.split('=')[1], item.title);
                resultsDiv.appendChild(card);
            }
        });
    }

    async function loadAudio(id, title) {
        const player = document.getElementById('player');
        const audio = document.getElementById('audio-element');
        const trackTitle = document.getElementById('track-name');

        player.style.display = "block";
        trackTitle.innerText = "جاري جلب الرابط المباشر: " + title;

        try {
            const response = await fetch(`${currentServer}/streams/${id}`);
            const data = await response.json();
            
            // اختيار أفضل جودة صوت متاحة (Audio Only)
            const stream = data.audioStreams.find(s => s.format === 'M4A' || s.format === 'WEBM') || data.audioStreams[0];
            
            audio.src = stream.url;
            trackTitle.innerText = "تشغيل الآن: " + title;
            audio.play();
        } catch (err) {
            alert("خطأ في تشغيل هذه الأغنية.");
        }
    }
</script>

</body>
</html>

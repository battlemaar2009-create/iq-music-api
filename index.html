<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music World | المليارات</title>
    <style>
        :root { --main: #1db954; --bg: #0b0b0b; --card: #161616; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding-bottom: 110px; }
        .header { padding: 30px 20px; text-align: center; background: linear-gradient(var(--main), var(--bg)); }
        .search-box { display: flex; max-width: 400px; margin: auto; gap: 5px; }
        input { flex: 1; padding: 12px; border-radius: 20px; border: none; outline: none; background: #222; color: white; }
        button { padding: 12px 20px; border-radius: 20px; border: none; background: white; font-weight: bold; cursor: pointer; }
        .results { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; padding: 15px; }
        .card { background: var(--card); padding: 10px; border-radius: 10px; text-align: center; font-size: 13px; cursor: pointer; }
        .card img { width: 100%; border-radius: 8px; margin-bottom: 8px; }
        .player { position: fixed; bottom: 0; width: 100%; background: #000; padding: 15px; border-top: 2px solid var(--main); display: none; box-sizing: border-box; }
        audio { width: 100%; height: 35px; }
    </style>
</head>
<body>

<div class="header">
    <h2>موسيقى المليارات 🎶</h2>
    <div class="search-box">
        <input type="text" id="q" placeholder="ابحث عن أي أغنية...">
        <button onclick="search()">بحث</button>
    </div>
</div>

<div id="status" style="text-align: center; margin-top: 10px; color: var(--main);"></div>
<div class="results" id="res"></div>

<div class="player" id="p">
    <div id="t" style="font-size: 12px; margin-bottom: 5px; text-align: center;"></div>
    <audio id="a" controls autoplay></audio>
</div>

<script>
    // استخدام وسيط AllOrigins لتجاوز حظر CORS
    const proxy = "https://api.allorigins.win/raw?url=";
    const api = "https://pipedapi.kavin.rocks/search?q=";

    async function search() {
        const q = document.getElementById('q').value;
        const res = document.getElementById('res');
        const status = document.getElementById('status');
        if(!q) return;

        res.innerHTML = "";
        status.innerText = "جاري جلب النتائج من السيرفر العالمي...";

        try {
            // ندمج الرابط مع الوسيط لفك الحظر
            const response = await fetch(`${proxy}${encodeURIComponent(api + q + "&filter=music_songs")}`);
            const data = await response.json();

            status.innerText = "";
            data.items.forEach(item => {
                if(item.type === 'stream') {
                    const div = document.createElement('div');
                    div.className = 'card';
                    div.innerHTML = `<img src="${item.thumbnail}"><div>${item.title}</div>`;
                    div.onclick = () => play(item.url.split('=')[1], item.title);
                    res.appendChild(div);
                }
            });
        } catch (e) {
            status.innerText = "السيرفر مشغول، حاول مجدداً بعد ثوانٍ";
        }
    }

    async function play(id, title) {
        const p = document.getElementById('p');
        const a = document.getElementById('a');
        const t = document.getElementById('t');
        
        p.style.display = "block";
        t.innerText = "جاري الاتصال بالبث المباشر...";

        try {
            const streamUrl = `${proxy}${encodeURIComponent("https://pipedapi.kavin.rocks/streams/" + id)}`;
            const response = await fetch(streamUrl);
            const data = await response.json();
            
            const audio = data.audioStreams.find(s => s.format === 'M4A') || data.audioStreams[0];
            a.src = audio.url;
            t.innerText = "تشغيل: " + title;
            a.play();
        } catch (e) {
            alert("خطأ في تشغيل الرابط");
        }
    }
</script>
</body>
</html>

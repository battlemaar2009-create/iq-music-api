<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مليارات الموسيقى 🎶</title>
    <style>
        :root { --main: #1db954; --bg: #0b0b0b; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding-bottom: 120px; }
        .container { padding: 20px; max-width: 600px; margin: auto; }
        .song-card { display: flex; align-items: center; background: #181818; margin-bottom: 12px; padding: 12px; border-radius: 10px; cursor: pointer; transition: 0.3s; border: 1px solid transparent; }
        .song-card:hover { border-color: var(--main); background: #222; }
        .song-card img { width: 55px; height: 55px; border-radius: 6px; margin-left: 15px; }
        .song-info { flex: 1; text-align: right; }
        .song-title { font-weight: bold; font-size: 14px; color: #fff; }
        
        /* مشغل الموسيقى الثابت في الأسفل */
        .player-bar { position: fixed; bottom: 0; width: 100%; background: #121212; border-top: 2px solid var(--main); padding: 15px; box-sizing: border-box; display: none; z-index: 1000; }
        audio { width: 100%; height: 35px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center; color: var(--main);">المكتبة الذكية 🎵</h2>
    <div id="loader" style="text-align: center;">جاري جلب المليارات من السيرفر...</div>
    <div id="music-list"></div>
</div>

<div class="player-bar" id="player">
    <div id="now-playing" style="font-size: 12px; color: var(--main); text-align: center;"></div>
    <audio id="main-audio" controls autoplay></audio>
</div>

<script>
    // الرابط الذي حصلنا عليه من زر Raw لملف database.json
    // ملاحظة: استبدل USER و REPO ببياناتك الحقيقية
    const dbUrl = "https://raw.githubusercontent.com/USER/REPO/main/database.json";

    async function loadMusic() {
        try {
            const response = await fetch(dbUrl);
            const songs = await response.json();
            
            const listDiv = document.getElementById('music-list');
            const loader = document.getElementById('loader');
            
            loader.style.display = "none";
            listDiv.innerHTML = "";

            songs.forEach(song => {
                const card = document.createElement('div');
                card.className = 'song-card';
                card.innerHTML = `
                    <img src="${song.img}" alt="thumbnail">
                    <div class="song-info">
                        <div class="song-title">${song.name}</div>
                    </div>
                `;
                card.onclick = () => playSong(song.id, song.name);
                listDiv.appendChild(card);
            });
        } catch (e) {
            document.getElementById('loader').innerText = "فشل الاتصال بقاعدة البيانات. تأكد من تشغيل الـ Action.";
        }
    }

    function playSong(id, title) {
        const player = document.getElementById('player');
        const audio = document.getElementById('main-audio');
        const titleDiv = document.getElementById('now-playing');

        player.style.display = "block";
        titleDiv.innerText = "أنت تستمع إلى: " + title;
        
        // رابط البث المباشر (Stream) باستخدام المعرف الذي جلبه البايثون
        audio.src = `https://pipedapi.kavin.rocks/streams/${id}`;
        audio.play();
    }

    // تشغيل الدالة عند فتح الصفحة
    loadMusic();
</script>

</body>
</html>

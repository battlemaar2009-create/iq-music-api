<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music billions | مكتبة المليارات</title>
    <style>
        :root { --primary: #1db954; --bg: #000000; --card: #181818; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding-bottom: 120px; }
        .header { padding: 40px 20px; text-align: center; background: linear-gradient(var(--primary), var(--bg)); }
        .search-area { max-width: 500px; margin: auto; display: flex; gap: 8px; }
        input { flex: 1; padding: 15px; border-radius: 30px; border: none; background: #222; color: white; outline: none; }
        button { padding: 15px 25px; border-radius: 30px; border: none; background: white; font-weight: bold; cursor: pointer; }
        .results { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; padding: 20px; }
        .card { background: var(--card); padding: 12px; border-radius: 12px; text-align: center; transition: 0.3s; }
        .card:hover { transform: scale(1.05); background: #282828; }
        .card img { width: 100%; border-radius: 10px; margin-bottom: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .p-bar { position: fixed; bottom: 0; width: 100%; background: #121212; padding: 20px; border-top: 2px solid var(--primary); display: none; box-sizing: border-box; z-index: 9999; }
        audio { width: 100%; height: 40px; }
    </style>
</head>
<body>

<div class="header">
    <h1>موسيقى المليارات 🎶</h1>
    <div class="search-area">
        <input type="text" id="query" placeholder="اكتب اسم الأغنية أو الفنان...">
        <button onclick="fetchMusic()">بحث</button>
    </div>
</div>

<div id="msg" style="text-align: center; margin: 20px; color: var(--primary);"></div>
<div class="results" id="list"></div>

<div class="p-bar" id="playerBox">
    <div id="nowPlaying" style="font-size: 13px; margin-bottom: 10px; text-align: center; color: var(--primary);"></div>
    <audio id="mainAudio" controls autoplay></audio>
</div>

<script>
    // نستخدم وسيطاً مختلفاً تماماً لضمان تخطي الحظر
    const corsProxy = "https://corsproxy.io/?";
    const apiBase = "https://pipedapi.kavin.rocks";

    async function fetchMusic() {
        const q = document.getElementById('query').value;
        const list = document.getElementById('list');
        const msg = document.getElementById('msg');
        
        if(!q) return;
        list.innerHTML = "";
        msg.innerText = "جاري البحث في السيرفرات العالمية... انتظر ثانية";

        try {
            // استخدام corsproxy.io وهو وسيط سريع ومستقر جداً
            const targetUrl = `${apiBase}/search?q=${encodeURIComponent(q)}&filter=music_songs`;
            const response = await fetch(corsProxy + encodeURIComponent(targetUrl));
            const data = await response.json();

            if(!data.items || data.items.length === 0) {
                msg.innerText = "لم نجد نتائج، جرب كلمات أخرى";
                return;
            }

            msg.innerText = "";
            data.items.forEach(item => {
                if(item.type === 'stream') {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `<img src="${item.thumbnail}"><div style="font-size:12px; font-weight:bold;">${item.title}</div>`;
                    card.onclick = () => startPlayer(item.url.split('=')[1], item.title);
                    list.appendChild(card);
                }
            });
        } catch (e) {
            msg.innerHTML = "حدث خطأ في الاتصال. <br> نصيحة: تأكد من أنك تشغل الرابط من GitHub وليس من ملف محلي.";
        }
    }

    async function startPlayer(id, title) {
        const box = document.getElementById('playerBox');
        const audio = document.getElementById('mainAudio');
        const text = document.getElementById('nowPlaying');

        box.style.display = "block";
        text.innerText = "جاري تحضير البث: " + title;

        try {
            const streamTarget = `${apiBase}/streams/${id}`;
            const res = await fetch(corsProxy + encodeURIComponent(streamTarget));
            const data = await res.json();
            
            // اختيار رابط الصوت المباشر
            const audioData = data.audioStreams.find(s => s.format === 'M4A') || data.audioStreams[0];
            audio.src = audioData.url;
            text.innerText = "تشغيل الآن: " + title;
            audio.play();
        } catch (e) {
            alert("عذراً، هذا الرابط محمي أو السيرفر مضغوط.");
        }
    }
</script>
</body>
</html>

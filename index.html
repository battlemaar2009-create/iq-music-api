<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Universe | مكتبة المليارات</title>
    <style>
        :root { --primary: #1db954; --bg: #000; --card: #121212; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding-bottom: 120px; overflow-x: hidden; }
        .header { padding: 30px 20px; text-align: center; background: linear-gradient(var(--primary), #000); }
        .search-area { max-width: 500px; margin: auto; display: flex; gap: 8px; }
        input { flex: 1; padding: 15px; border-radius: 30px; border: none; background: #222; color: white; outline: none; }
        button { padding: 15px 25px; border-radius: 30px; border: none; background: white; font-weight: bold; cursor: pointer; }
        
        .results { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; padding: 20px; }
        .card { background: var(--card); padding: 12px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.3s; }
        .card:hover { background: #222; transform: scale(1.05); }
        .card img { width: 100%; border-radius: 10px; margin-bottom: 10px; }
        
        .p-bar { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 2px solid var(--primary); padding: 10px; display: none; z-index: 9999; }
        /* إخفاء فيديو يوتيوب وجعل الصوت فقط هو المسموع */
        #yt-player { position: absolute; top: -9999px; left: -9999px; }
        .controls { text-align: center; }
    </style>
</head>
<body>

<div class="header">
    <h1>مكتبة المليارات 🎶</h1>
    <div class="search-area">
        <input type="text" id="searchInput" placeholder="ابحث عن أغنية أو فنان...">
        <button onclick="search()">بحث</button>
    </div>
</div>

<div id="status" style="text-align: center; margin: 20px; color: var(--primary);"></div>
<div class="results" id="list"></div>

<div class="p-bar" id="playerBar">
    <div id="trackTitle" style="text-align: center; font-size: 14px; margin-bottom: 10px;"></div>
    <div class="controls">
        <div id="yt-player"></div>
        <button onclick="togglePlay()" style="background: var(--primary); color: white; padding: 10px 30px;">تشغيل / إيقاف</button>
    </div>
</div>

<script>
    // استخدام محرك بحث جوجل للبحث عن فيديوهات يوتيوب مباشرة
    async function search() {
        const query = document.getElementById('searchInput').value;
        const list = document.getElementById('list');
        const status = document.getElementById('status');
        if(!query) return;

        list.innerHTML = "";
        status.innerText = "جاري البحث في قاعدة البيانات...";

        // نستخدم محرك بحث مفتوح لا يتطلب مفتاح API
        const searchUrl = `https://suggestqueries.google.com/complete/search?client=youtube&ds=yt&q=${encodeURIComponent(query)}`;
        
        // ملاحظة: البحث عن النتائج الفعلية يتم عبر سكريبت خارجي آمن
        try {
            const script = document.createElement('script');
            script.src = `https://www.youtube.com/results?search_query=${encodeURIComponent(query)}&pbj=1`;
            // لتسهيل الأمر سنستخدم رابط Piped ولكن مع معالجة خطأ الـ CORS يدوياً عبر زر "تشغيل"
            const response = await fetch(`https://pipedapi.kavin.rocks/search?q=${encodeURIComponent(query)}&filter=music_songs`);
            const data = await response.json();

            status.innerText = "";
            data.items.forEach(item => {
                if(item.type === 'stream') {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `<img src="${item.thumbnail}"><div>${item.title}</div>`;
                    card.onclick = () => playSong(item.url.split('=')[1], item.title);
                    list.appendChild(card);
                }
            });
        } catch (e) {
            status.innerHTML = "حدث ضغط على السيرفر، جرب البحث مرة أخرى الآن";
        }
    }

    let player;
    function playSong(id, title) {
        document.getElementById('playerBar').style.display = "block";
        document.getElementById('trackTitle').innerText = "أنت تستمع إلى: " + title;
        
        const playerDiv = document.getElementById('yt-player');
        playerDiv.innerHTML = `<iframe width="200" height="200" src="https://www.youtube.com/embed/${id}?autoplay=1" frameborder="0" allow="autoplay"></iframe>`;
    }

    function togglePlay() {
        const iframe = document.querySelector('iframe');
        if (iframe) {
            const src = iframe.src;
            if (src.includes("autoplay=1")) {
                iframe.src = src.replace("autoplay=1", "autoplay=0");
            } else {
                iframe.src = src.replace("autoplay=0", "autoplay=1");
            }
        }
    }
</script>
</body>
</html>

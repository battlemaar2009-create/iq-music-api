name: Music Auto Update

# تحديد متى يعمل السيرفر
on:
  schedule:
    - cron: '0 * * * *'  # يعمل تلقائياً كل ساعة
  workflow_dispatch:      # يظهر لك زر التشغيل اليدوي في صفحة Actions

jobs:
  build:
    runs-on: ubuntu-latest
    
    # السماح للأكشن بالكتابة في المستودع (مهم جداً لإنشاء database.json)
    permissions:
      contents: write

    steps:
      # 1. تحميل ملفات المستودع إلى سيرفر GitHub
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. تجهيز لغة بايثون
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      # 3. تثبيت المكتبات اللازمة (مثل requests)
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # 4. تشغيل الكود الخاص بك (تأكد أن الملف اسمه app.py)
      - name: Run Python Script
        run: python app.py

      # 5. حفظ التعديلات ورفع ملف database.json الجديد
      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add database.json
          git commit -m "Update music database [skip ci]" || echo "No changes to commit"
          git push
          

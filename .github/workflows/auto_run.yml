name: Music Update Bot
on:
  schedule:
    - cron: '0 * * * *' # تشغيل تلقائي كل ساعة
  workflow_dispatch: # يسمح لك بتشغيله يدوياً بضغطة زر

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3 # سحب ملفاتك
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install Requests
        run: pip install requests
      - name: Run Script
        run: python update_music.py
      - name: Save Results
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "actions@github.com"
          git add database.json
          git commit -m "Update Music List" || exit 0
          git push
          
